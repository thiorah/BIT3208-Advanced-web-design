<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">

    <h2 class="site-title">Calvin's Repair</h2>

    <div class="split">
        <div class="left">
            <input type="text" id="customer_name" placeholder="Customer Name">
            <input type="text" id="phone_model" placeholder="Phone Model">
            <input type="text" id="repair_type" placeholder="Repair Type">
            <input type="number" id="repair_price" placeholder="Repair Price">
            <button onclick="addRepair()">Add Repair</button>
        </div>

        <div class="right">
            <h3>Repair Records</h3>
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Repair</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody id="repairTable"></tbody>
            </table>
        </div>
    </div>

</div>

<script src="/script.js"></script>

</body>
</html>
